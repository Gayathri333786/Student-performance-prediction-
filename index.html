<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            min-height:100vh;
        }

        .card{
            margin-top:50px;
            border-radius:20px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.2);
        }
    </style>

</head>

<body>

<div class="container">

<div class="card p-4">

    <h2 class="text-center mb-4">
        🎓 Student Performance Prediction
    </h2>

    <form method="POST">

        <div class="mb-3">
            <label>Student Name</label>
            <input
            type="text"
            name="name"
            class="form-control"
            required>
        </div>

        <div class="mb-3">
            <label>Attendance (%)</label>
            <input
            type="number"
            name="attendance"
            class="form-control"
            required>
        </div>

        <div class="mb-3">
            <label>Study Hours</label>
            <input
            type="number"
            name="study_hours"
            class="form-control"
            required>
        </div>

        <div class="mb-3">
            <label>Assignment Score</label>
            <input
            type="number"
            name="assignment"
            class="form-control"
            required>
        </div>

        <div class="mb-3">
            <label>Internal Marks</label>
            <input
            type="number"
            name="internal_marks"
            class="form-control"
            required>
        </div>

        <button
        class="btn btn-primary w-100"
        type="submit">

        Predict Performance

        </button>

    </form>

    {% if prediction %}

    <div class="alert alert-success mt-4">

        <h4>
            {{ name }}
        </h4>

        <h5>
            Predicted Marks:
            {{ prediction }}
        </h5>

    </div>

    {% endif %}

    <div class="mt-3 text-center">

        <a href="/dashboard"
        class="btn btn-success">

        Dashboard

        </a>

        <a href="/history"
        class="btn btn-dark">

        History

        </a>

    </div>

</div>

</div>

</body>
</html>
